# release.yml — 当推送 v*.*.* 或 v*.*.*-* 格式的 tag 时，自动构建全平台产物并发布 GitHub Release
name: Build & Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  APP_NAME: go-port-forward
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            tags: "base64x sonic"
          - goos: windows
            goarch: arm64
            ext: .exe
            tags: "go_json"
          - goos: linux
            goarch: amd64
            ext: ""
            tags: "base64x sonic"
          - goos: linux
            goarch: arm64
            ext: ""
            tags: "go_json"
          - goos: linux
            goarch: arm
            ext: ""
            tags: "go_json"
          - goos: darwin
            goarch: amd64
            ext: ""
            tags: "base64x sonic"
          - goos: darwin
            goarch: arm64
            ext: ""
            tags: "go_json"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"
          DIR_NAME="${APP_NAME}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${DIR_NAME}"
          go build -trimpath \
            -tags "${{ matrix.tags }}" \
            -ldflags "${LDFLAGS}" \
            -o "dist/${DIR_NAME}/${APP_NAME}${{ matrix.ext }}" .
          # 复制配置示例和 LICENSE
          [ -f config.yaml ] && cp config.yaml "dist/${DIR_NAME}/config.yaml.example"
          [ -f LICENSE ] && cp LICENSE "dist/${DIR_NAME}/LICENSE"

      - name: Package archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DIR_NAME="${APP_NAME}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -qr "${DIR_NAME}.zip" "${DIR_NAME}"
            echo "ASSET=${DIR_NAME}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${DIR_NAME}.tar.gz" "${DIR_NAME}"
            echo "ASSET=${DIR_NAME}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ env.ASSET }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums-sha256.txt || true
          cat checksums-sha256.txt

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          # 判断是否为预发布版本 (含 - 后缀)
          if echo "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-.+$'; then
            echo "PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ env.APP_NAME }} ${{ steps.version.outputs.VERSION }}
          prerelease: ${{ steps.version.outputs.PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums-sha256.txt

