<!doctype html>
<html lang="zh-CN" data-bs-theme="light" data-bs-theme-mode="auto">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Port Forward Manager</title>
  <link rel="icon" href="/images/favicon.ico"/>
  <!-- CSS load order: bootstrap → bootstrap-icons → theme → app → user-theme -->
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css"/>
  <link rel="stylesheet" href="/css/lib/bootstrap-icons.css"/>
  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <link rel="stylesheet" href="/css/user-theme.css"/>
  <script>
    ;(function(){
      var mode = 'auto';
      var theme = mode === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.documentElement.setAttribute('data-bs-theme', theme);
      document.documentElement.setAttribute('data-bs-theme-mode', mode);
    })();
  </script>
</head>
<body x-data="portForwardApp()" x-init="init()">

<!-- Top progress bar (NProgress-like) -->
<div class="htmx-progress"></div>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" onclick="closeMobileSidebar()"></div>

<!-- Layout -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="layout__sidebar" x-data="{collapsed: false}">
    <div class="sidebar__brand">
      <img src="/images/logo.png" class="sidebar__brand-logo" alt="logo"/>
      <span class="sidebar__brand-text fw-bold">Port Forward</span>
    </div>
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__link sidebar__link--active" @click.prevent>
        <i class="bi bi-diagram-3 sidebar__link-icon"></i>
        <span class="sidebar__link-text" x-text="t('转发规则','Rules')"></span>
      </a>
      <a href="#" class="sidebar__link" @click.prevent="showAddModal()">
        <i class="bi bi-plus-circle sidebar__link-icon"></i>
        <span class="sidebar__link-text" x-text="t('添加规则','Add Rule')"></span>
      </a>
      <a href="#" class="sidebar__link" style="display:none" x-show="canShowWSLImport" @click.prevent="showWSLModal()">
        <i class="bi bi-terminal sidebar__link-icon"></i>
        <span class="sidebar__link-text" x-text="t('WSL2 导入','WSL2 Import')"></span>
      </a>
      <a href="#" class="sidebar__link" @click.prevent="showDiagnosticsModal()">
        <i class="bi bi-activity sidebar__link-icon"></i>
        <span class="sidebar__link-text" x-text="t('运行诊断','Diagnostics')"></span>
      </a>
    </nav>
    <!-- Language & Theme toggle at bottom -->
    <div class="mt-auto px-3 py-3">
      <button class="sidebar__link w-100 border-0 bg-transparent text-start" @click="toggleLang()" :title="t('切换语言','Switch Language')">
        <i class="bi bi-translate sidebar__link-icon"></i>
        <span class="sidebar__link-text" x-text="t('English','中文')"></span>
      </button>
      <button class="sidebar__link w-100 border-0 bg-transparent text-start" @click="toggleTheme()" :title="t('切换主题','Toggle Theme')">
        <i class="bi sidebar__link-icon" :class="isDark ? 'bi-sun' : 'bi-moon'"></i>
        <span class="sidebar__link-text" x-text="isDark ? t('浅色模式','Light') : t('深色模式','Dark')"></span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="layout__main">

    <!-- Header -->
    <header class="layout__header px-3 d-flex align-items-center">
      <button class="header__toggle" onclick="toggleSidebar()" :title="t('折叠侧边栏','Toggle Sidebar')">
        <i class="bi bi-list"></i>
      </button>
      <span class="header__breadcrumb ms-3 fw-semibold" x-text="t('端口转发管理','Port Forward Manager')"></span>
      <div class="header__spacer"></div>
      <div class="header__actions gap-2">
        <!-- Quick stats chips -->
        <span class="badge text-bg-secondary rounded-pill px-3"><span x-text="t('规则','Rules')"></span> <strong x-text="stats.total_rules||0"></strong></span>
        <span class="badge text-bg-success rounded-pill px-3"><span x-text="t('运行中','Active')"></span> <strong x-text="stats.active_rules||0"></strong></span>
        <span class="badge text-bg-info rounded-pill px-3">↑ <span x-text="fmtBytes(stats.total_bytes_in)"></span></span>
        <span class="badge text-bg-primary rounded-pill px-3">↓ <span x-text="fmtBytes(stats.total_bytes_out)"></span></span>
        <button class="btn btn-sm btn-primary btn-icon ms-2" @click="showAddModal()">
          <i class="bi bi-plus-lg"></i><span x-text="t('添加规则','Add Rule')"></span>
        </button>
        <button class="btn btn-sm btn-outline-secondary btn-icon" style="display:none" x-show="canShowWSLImport" @click="showWSLModal()">
          <i class="bi bi-terminal"></i><span class="d-none d-md-inline">WSL2</span>
        </button>
        <button class="btn btn-sm btn-outline-secondary btn-icon" @click="showDiagnosticsModal()" :title="t('运行诊断','Diagnostics')">
          <i class="bi bi-activity"></i><span class="d-none d-lg-inline" x-text="t('诊断','Diag')"></span>
        </button>
        <button class="btn btn-sm btn-outline-secondary" @click="refresh()" :title="t('刷新','Refresh')">
          <i class="bi bi-arrow-clockwise" :class="{'spin': loading}"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <main class="layout__content">
      <div class="p-content">

        <!-- Stat cards row -->
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="stat-card">
              <div class="stat-card__icon stat-card__icon--primary"><i class="bi bi-diagram-3"></i></div>
              <div class="stat-card__value" x-text="stats.total_rules||0"></div>
              <div class="stat-card__label" x-text="t('总规则数','Total Rules')"></div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card">
              <div class="stat-card__icon stat-card__icon--success"><i class="bi bi-play-circle"></i></div>
              <div class="stat-card__value" x-text="stats.active_rules||0"></div>
              <div class="stat-card__label" x-text="t('活跃转发','Active')"></div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card">
              <div class="stat-card__icon stat-card__icon--info"><i class="bi bi-arrow-up-circle"></i></div>
              <div class="stat-card__value" x-text="fmtBytes(stats.total_bytes_in)"></div>
              <div class="stat-card__label" x-text="t('总流入','Inbound')"></div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card">
              <div class="stat-card__icon stat-card__icon--warning"><i class="bi bi-arrow-down-circle"></i></div>
              <div class="stat-card__value" x-text="fmtBytes(stats.total_bytes_out)"></div>
              <div class="stat-card__label" x-text="t('总流出','Outbound')"></div>
            </div>
          </div>
        </div>

        <!-- Rules table -->
        <div class="table-container">
          <div class="table-container__toolbar">
            <div class="table-container__search">
              <i class="bi bi-search"></i>
              <input class="form-control form-control-sm" type="search" :placeholder="t('搜索规则名称…','Search rules…')" x-model="search"/>
            </div>
            <div class="table-container__actions">
              <button class="btn btn-sm btn-primary btn-icon" @click="showAddModal()">
                <i class="bi bi-plus-lg"></i><span x-text="t('添加','Add')"></span>
              </button>
              <button class="btn btn-sm btn-outline-secondary btn-icon" style="display:none" x-show="canShowWSLImport" @click="showWSLModal()">
                <i class="bi bi-terminal"></i><span class="d-none d-sm-inline">WSL2</span>
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th x-text="t('名称','Name')"></th>
                  <th x-text="t('监听','Listen')"></th>
                  <th x-text="t('协议','Proto')"></th>
                  <th x-text="t('目标','Target')"></th>
                  <th x-text="t('状态','Status')"></th>
                  <th x-text="t('流入','In')"></th>
                  <th x-text="t('流出','Out')"></th>
                  <th x-text="t('连接数','Conns')"></th>
                  <th x-text="t('操作','Actions')"></th>
                </tr>
              </thead>
              <tbody>
	                <template x-for="r in filteredRules" :key="r.id">
	                  <tr :id="'rule-row-' + r.id" :class="{ 'rule-row-focus': focusedRuleId === r.id }">
                    <td>
                      <span class="fw-medium" x-text="r.name"></span>
                      <div class="text-muted small" x-text="r.comment" x-show="r.comment"></div>
                    </td>
                    <td class="font-monospace small" x-text="(r.listen_addr||'0.0.0.0')+':'+r.listen_port"></td>
                    <td>
                      <span class="badge text-bg-secondary rounded-pill" x-text="(r.protocol||'tcp').toUpperCase()"></span>
                    </td>
                    <td class="font-monospace small" x-text="r.target_addr+':'+r.target_port"></td>
                    <td>
                      <span class="badge--status" :class="statusClass(r.status)"
                            :title="r.error_msg || ''"
                            :style="r.error_msg ? 'cursor:help' : ''">
                        <span class="badge--status-dot"></span>
                        <span x-text="statusLabel(r.status)"></span>
                      </span>
                    </td>
                    <td class="small" x-text="fmtBytes(r.bytes_in)"></td>
                    <td class="small" x-text="fmtBytes(r.bytes_out)"></td>
                    <td class="small"><span x-text="r.active_conns"></span>/<span x-text="r.total_conns"></span></td>
                    <td>
                      <div class="d-flex gap-1">
                        <button class="btn btn-xs btn-outline-secondary" @click="editRule(r)" :title="t('编辑','Edit')">
                          <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-xs" :class="r.enabled ? 'btn-outline-warning' : 'btn-outline-success'"
                                @click="toggle(r)" :title="r.enabled ? t('禁用','Disable') : t('启用','Enable')">
                          <i class="bi" :class="r.enabled ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                        </button>
                        <button class="btn btn-xs btn-outline-danger" @click="confirmDelete(r)" :title="t('删除','Delete')">
                          <i class="bi bi-trash"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="filteredRules.length === 0">
                  <td colspan="9">
                    <div class="empty-state py-4">
                      <div class="empty-state__icon"><i class="bi bi-inbox"></i></div>
                      <div class="empty-state__title" x-text="search ? t('未找到匹配规则','No matching rules') : t('暂无转发规则','No forwarding rules')"></div>
                      <div class="empty-state__description" x-show="!search" x-text="t('点击右上角「添加规则」开始配置端口转发。','Click \"Add Rule\" in the top-right corner to start.')"></div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div><!-- /table-container -->

      </div><!-- /p-content -->
    </main>

    <footer class="layout__footer text-center">
      Port Forward Manager &copy; 2025 &nbsp;|&nbsp; <span x-text="t('乾擎科技开源工具链','QianQing Open Source Toolchain')"></span>
    </footer>
  </div><!-- /layout__main -->
</div><!-- /layout -->

<!-- ============================================================
     Add/Edit Rule Modal
     ============================================================ -->
<div class="modal fade" id="ruleModal" tabindex="-1" aria-labelledby="ruleModalLabel">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ruleModalLabel" x-text="form.id ? t('编辑规则','Edit Rule') : t('添加规则','Add Rule')"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Error alert -->
        <div class="alert alert-danger py-2 small mb-3" x-show="formError" x-text="formError"></div>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label"><span x-text="t('规则名称','Rule Name')"></span> <span class="text-danger">*</span></label>
            <input class="form-control" :placeholder="t('如：nginx-8080','e.g. nginx-8080')" x-model="form.name"/>
          </div>
          <div class="col-md-8">
            <label class="form-label" x-text="t('监听地址','Listen Address')"></label>
            <input class="form-control" x-model="form.listen_addr" placeholder="0.0.0.0"/>
          </div>
          <div class="col-md-4">
            <label class="form-label"><span x-text="t('监听端口','Listen Port')"></span> <span class="text-danger">*</span></label>
            <input class="form-control" type="number" min="1" max="65535" x-model.number="form.listen_port" placeholder="8080"/>
          </div>
          <div class="col-md-4">
            <label class="form-label" x-text="t('协议','Protocol')"></label>
            <select class="form-select" x-model="form.protocol">
              <option value="tcp">TCP</option>
              <option value="udp">UDP</option>
              <option value="both">TCP + UDP</option>
            </select>
          </div>
          <div class="col-md-5">
            <label class="form-label"><span x-text="t('目标地址','Target Address')"></span> <span class="text-danger">*</span></label>
            <input class="form-control" x-model="form.target_addr" placeholder="192.168.1.100"/>
          </div>
          <div class="col-md-3">
            <label class="form-label"><span x-text="t('目标端口','Target Port')"></span> <span class="text-danger">*</span></label>
            <input class="form-control" type="number" min="1" max="65535" x-model.number="form.target_port" placeholder="80"/>
          </div>
          <div class="col-12">
            <label class="form-label" x-text="t('备注','Comment')"></label>
            <input class="form-control" x-model="form.comment" :placeholder="t('可选备注说明','Optional comment')"/>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" x-model="form.enabled" id="chkEnabled"/>
              <label class="form-check-label" for="chkEnabled" x-text="t('立即启用','Enable Now')"></label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" x-model="form.add_firewall" id="chkFw"/>
              <label class="form-check-label" for="chkFw" x-text="t('自动添加防火墙规则','Auto-add Firewall Rule')"></label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal" x-text="t('取消','Cancel')"></button>
        <button class="btn btn-primary" @click="saveRule()" :disabled="saving">
          <span x-show="saving" class="spinner-border spinner-border-sm me-1"></span>
          <span x-text="saving ? t('保存中…','Saving…') : t('保存','Save')"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     WSL2 Import Modal
     ============================================================ -->
<div class="modal fade" id="wslModal" tabindex="-1" aria-labelledby="wslModalLabel" style="display:none" x-show="canShowWSLImport">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="wslModalLabel"><i class="bi bi-terminal me-2"></i><span x-text="t('从 WSL2 导入端口','Import Ports from WSL2')"></span></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;height:60vh;overflow:hidden">
        <!-- 固定区域：发行版选择 + 操作按钮 -->
        <div class="flex-shrink-0">
          <div class="mb-3">
            <label class="form-label" x-text="t('选择发行版','Select Distro')"></label>
            <select class="form-select" x-model="wslDistro" @change="loadWSLPorts()">
              <option value="" x-text="t('— 请选择 —','— Select —')"></option>
              <template x-for="d in wslDistros" :key="d.name">
                <option :value="d.name" x-text="d.name + (d.default ? t(' (默认)',' (default)') : '') + ' [' + d.state + ']'"></option>
              </template>
            </select>
          </div>
          <div x-show="wslLoading" class="loading-spinner">
            <div class="loading-spinner__icon"></div>
            <span class="loading-spinner__text" x-text="t('正在查询端口…','Loading ports…')"></span>
          </div>
          <div class="mb-2 d-flex align-items-center gap-2" x-show="wslPorts.length > 0 && !wslLoading">
            <button class="btn btn-xs btn-outline-secondary" @click="wslSelectAll()" x-text="t('全选','All')"></button>
            <button class="btn btn-xs btn-outline-secondary" @click="wslSelected=[]" x-text="t('清空','Clear')"></button>
            <span class="text-muted small"><span x-text="t('已选','Selected')"></span> <span x-text="wslSelected.length"></span> <span x-text="t('项','item(s)')"></span></span>
          </div>
        </div>
        <!-- 滚动区域：端口列表 -->
        <div class="flex-grow-1" style="overflow-y:auto;min-height:0" x-show="wslPorts.length > 0 && !wslLoading">
          <table class="table table-sm table-hover align-middle mb-0" style="position:relative">
            <thead style="position:sticky;top:0;z-index:1;background:var(--bs-modal-bg,var(--bs-body-bg))">
              <tr><th style="width:2rem"></th><th x-text="t('协议','Proto')"></th><th x-text="t('端口','Port')"></th><th x-text="t('进程','Process')"></th><th x-text="t('本地地址','Local Addr')"></th></tr>
            </thead>
            <tbody>
              <template x-for="(p, idx) in wslPorts" :key="idx">
                <tr @click="wslToggle(p)" style="cursor:pointer">
                  <td><input type="checkbox" :checked="wslIsSelected(p)" @click.stop="wslToggle(p)"/></td>
                  <td><span class="badge text-bg-secondary rounded-pill" x-text="p.protocol.toUpperCase()"></span></td>
                  <td class="font-monospace" x-text="p.port"></td>
                  <td x-text="p.process||'—'"></td>
                  <td class="font-monospace small text-muted" x-text="p.local_addr"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div class="empty-state py-3" x-show="wslDistro && wslPorts.length === 0 && !wslLoading">
          <div class="empty-state__icon fs-3"><i class="bi bi-info-circle"></i></div>
          <div class="empty-state__title" x-text="t('未发现监听端口','No listening ports found')"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal" x-text="t('取消','Cancel')"></button>
        <button class="btn btn-success btn-icon" @click="importWSL()" :disabled="wslSelected.length === 0 || wslImporting">
          <span x-show="wslImporting" class="spinner-border spinner-border-sm"></span>
          <i class="bi bi-download" x-show="!wslImporting"></i>
          <span x-text="wslImporting ? t('导入中…','Importing…') : t('导入选中','Import') + ' (' + wslSelected.length + ')'"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     Diagnostics Modal
     ============================================================ -->
<div class="modal fade" id="diagnosticsModal" tabindex="-1" aria-labelledby="diagnosticsModalLabel">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header diagnostics-modal__header">
        <div class="diagnostics-modal__title-group">
          <h5 class="modal-title" id="diagnosticsModalLabel"><i class="bi bi-activity me-2"></i><span x-text="t('运行诊断','Diagnostics')"></span></h5>
          <div class="text-muted small diagnostics-modal__meta" x-text="diagnostics && diagnostics.timestamp ? t('更新时间：','Updated: ') + fmtDateTime(diagnostics.timestamp) : t('查看 runtime、goroutine pool 与转发器状态','View runtime, goroutine pool & forwarder status')"></div>
        </div>
        <div class="diagnostics-modal__actions d-flex align-items-center gap-2">
	          <label class="form-check form-switch diagnostics-mode-toggle mb-0" :title="diagnosticsLocateOnly ? t('点击规则项后仅定位并高亮规则行，不自动打开编辑弹窗。', 'Clicking a diagnostics rule will only locate and highlight the row without opening edit dialog.') : t('点击规则项后将定位并打开对应规则编辑弹窗。', 'Clicking a diagnostics rule will locate and open the rule editor.')">
	            <input class="form-check-input" type="checkbox" x-model="diagnosticsLocateOnly">
	            <span class="form-check-label small" x-text="t('仅定位', 'Locate only')"></span>
	          </label>
	          <button type="button" class="btn btn-sm btn-outline-secondary btn-icon" @click="copyDiagnosticsJson()" :disabled="!diagnostics">
	            <i class="bi bi-clipboard"></i>
	            <span class="d-none d-sm-inline" x-text="t('复制 JSON','Copy JSON')"></span>
	          </button>
	          <button type="button" class="btn btn-sm btn-outline-secondary btn-icon" @click="downloadDiagnosticsJson()" :disabled="!diagnostics">
	            <i class="bi bi-download"></i>
	            <span class="d-none d-sm-inline" x-text="t('下载 JSON','Download')"></span>
	          </button>
          <button type="button" class="btn btn-sm btn-outline-secondary btn-icon" @click.stop.prevent="loadDiagnostics()" :disabled="diagnosticsLoading">
            <span x-show="diagnosticsLoading" class="spinner-border spinner-border-sm"></span>
            <i class="bi bi-arrow-clockwise" x-show="!diagnosticsLoading"></i>
            <span x-text="diagnosticsLoading ? t('刷新中…','Refreshing…') : t('刷新','Refresh')"></span>
          </button>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger py-2 small mb-3" x-show="diagnosticsError" x-text="diagnosticsError"></div>
        <div x-show="diagnosticsLoading && !diagnostics" class="loading-spinner mb-3">
          <div class="loading-spinner__icon"></div>
          <span class="loading-spinner__text" x-text="t('正在加载诊断信息…','Loading diagnostics…')"></span>
        </div>
        <div x-show="diagnostics">
          <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3">
              <div class="stat-card">
                <div class="stat-card__icon stat-card__icon--primary"><i class="bi bi-diagram-3"></i></div>
                <div class="stat-card__value" x-text="fmtNumber(diagnostics?.runtime?.goroutines)"></div>
                <div class="stat-card__label">Goroutines</div>
              </div>
            </div>
            <div class="col-6 col-lg-3">
              <div class="stat-card">
                <div class="stat-card__icon stat-card__icon--info"><i class="bi bi-memory"></i></div>

<!-- Page-specific Alpine component -->
<script>
'use strict'

// 国际化辅助 | i18n helper
let _currentLang = (() => {
  try { return localStorage.getItem('app_lang') || 'zh-CN' } catch { return 'zh-CN' }
})()
document.documentElement.lang = _currentLang
const _isEn = () => _currentLang === 'en'
const _t = (zh, en) => _isEn() ? en : zh

// Spin animation for refresh button
const _style = document.createElement('style')
_style.textContent = '.spin{animation:spin .6s linear infinite}'
document.head.appendChild(_style)

function portForwardApp() {
  return {
    rules: [],
    stats: {},
    search: '',
    loading: false,
    isDark: document.documentElement.getAttribute('data-bs-theme') === 'dark',
    lang: _currentLang,

    form: {},
    formError: '',
    saving: false,
    _ruleModal: null,

    wslDistros: [],
	    wslCapability: { supported:false, installed:false, enabled:false, has_distros:false, show_import:false, distros:[] },
    wslPorts: [],
    wslDistro: '',
    wslSelected: [],
    wslLoading: false,
    wslImporting: false,
	    diagnostics: null,
	    diagnosticsLoading: false,
	    diagnosticsError: '',
	    _diagnosticsInFlight: false,
	    diagnosticsLocateOnly: false,
	    focusedRuleId: '',
    _wslModal: null,
	    _diagnosticsModal: null,
	    _diagnosticsTimer: null,
	    _diagnosticsVisible: false,
	    _refreshTimer: null,
	    _refreshInFlight: false,
	    _focusedRuleTimer: null,

    get filteredRules() {
      const q = this.search.trim().toLowerCase()
      if (!q) return this.rules
      return this.rules.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.comment||'').toLowerCase().includes(q) ||
        String(r.listen_port).includes(q) ||
        (r.target_addr||'').toLowerCase().includes(q)
      )
    },

	    get canShowWSLImport() {
	      return !!this.wslCapability.show_import
	    },

    async init() {
      this._ruleModal = new bootstrap.Modal(document.getElementById('ruleModal'))
      this._wslModal  = new bootstrap.Modal(document.getElementById('wslModal'))
	      const diagnosticsModalEl = document.getElementById('diagnosticsModal')
	      this._diagnosticsModal = new bootstrap.Modal(diagnosticsModalEl)
	      diagnosticsModalEl.addEventListener('shown.bs.modal', () => {
	        this._diagnosticsVisible = true
	        this.loadDiagnostics()
	        this.startDiagnosticsRefresh()
	      })
	      diagnosticsModalEl.addEventListener('hidden.bs.modal', () => {
	        this._diagnosticsVisible = false
	        this.stopDiagnosticsRefresh()
	      })
	      await Promise.all([this.refresh(), this.loadWSLCapability()])
	      this._refreshTimer = setInterval(() => this.refresh({ background: true }), 8000)
	      document.addEventListener('visibilitychange', () => {
	        if (!document.hidden) this.refresh({ background: true })
	        if (this._diagnosticsVisible && !document.hidden) this.loadDiagnostics({ background: true })
	      })
    },

	    async loadWSLCapability() {
	      try {
	        const res = await fetch('/api/wsl/capability')
	        const d = await res.json()
	        this.wslCapability = d.success ? (d.data || {}) : { supported:false, installed:false, enabled:false, has_distros:false, show_import:false, distros:[] }
	      } catch {
	        this.wslCapability = { supported:false, installed:false, enabled:false, has_distros:false, show_import:false, distros:[] }
	      }
	      this.wslDistros = this.canShowWSLImport ? (this.wslCapability.distros || []) : []
	      if (!this.canShowWSLImport) {
	        this.wslPorts = []
	        this.wslSelected = []
	        this.wslDistro = ''
	        if (this._wslModal) this._wslModal.hide()
	      }
	    },

	    async refresh(options = {}) {
	      const background = !!options.background
	      if (background && document.hidden) return
	      if (this._refreshInFlight) return
	      this._refreshInFlight = true
	      if (!background) this.loading = true
      try {
	        const res = await fetch('/api/dashboard')
	        if (res.ok) {
	          const d = await res.json()
	          if (d.success && d.data) {
	            this.rules = d.data.rules || []
	            this.stats = d.data.stats || {}
	          }
	        }
      } finally {
	        if (!background) this.loading = false
	        this._refreshInFlight = false
      }
    },

    showAddModal() {
      this.formError = ''
	      this.form = this.newRuleForm()
      this._ruleModal.show()
    },

    editRule(r) {
      this.formError = ''
	      this.form = this.editableRuleForm(r)
      this._ruleModal.show()
    },

	    newRuleForm() {
	      return {
	        id: '',
	        name:'',
	        listen_addr:'0.0.0.0',
	        listen_port: null,
	        protocol:'tcp',
	        target_addr:'',
	        target_port: null,
	        comment:'',
	        enabled:true,
	        add_firewall:false,
	      }
	    },

	    editableRuleForm(rule = {}) {
	      return {
	        id: rule.id || '',
	        name: rule.name || '',
	        listen_addr: rule.listen_addr || '0.0.0.0',
	        listen_port: rule.listen_port ?? null,
	        protocol: rule.protocol || 'tcp',
	        target_addr: rule.target_addr || '',
	        target_port: rule.target_port ?? null,
	        comment: rule.comment || '',
	        enabled: rule.enabled ?? true,
	        add_firewall: rule.add_firewall ?? false,
	      }
	    },

	    buildRulePayload() {
	      return {
	        name: this.form.name,
	        listen_addr: this.form.listen_addr,
	        listen_port: Number(this.form.listen_port),
	        protocol: this.form.protocol,
	        target_addr: this.form.target_addr,
	        target_port: Number(this.form.target_port),
	        comment: this.form.comment || '',
	        enabled: !!this.form.enabled,
	        add_firewall: !!this.form.add_firewall,
	      }
	    },

	    async inspectRuleFromDiagnostics(id, options = {}) {
	      if (!id) return
	      const locateOnly = options.locateOnly ?? this.diagnosticsLocateOnly
	      if (!this.rules.some(r => r.id === id)) {
	        await this.refresh({ background: true })
	      }
	      const rule = this.rules.find(r => r.id === id)
	      if (!rule) {
	        showToast('warning', _t('未找到对应规则，可能已被删除。', 'The corresponding rule was not found. It may have been deleted.'))
	        return
	      }
	      this.search = ''
	      this.focusRuleRow(id)
	      if (this._diagnosticsModal) this._diagnosticsModal.hide()
	      if (locateOnly) {
	        showToast('info', _t('已定位到对应规则', 'Located the corresponding rule'))
	        return
	      }
	      window.setTimeout(() => this.editRule(rule), 220)
	    },

	    focusRuleRow(id) {
	      this.focusedRuleId = id
	      if (this._focusedRuleTimer) clearTimeout(this._focusedRuleTimer)
	      window.requestAnimationFrame(() => {
	        const row = document.getElementById('rule-row-' + id)
	        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' })
	      })
	      this._focusedRuleTimer = window.setTimeout(() => {
	        if (this.focusedRuleId === id) this.focusedRuleId = ''
	      }, 3200)
	    },

    async saveRule() {
      this.formError = ''
      if (!this.form.name) { this.formError = _t('请填写规则名称', 'Rule name is required'); return }
      if (!this.form.target_addr) { this.formError = _t('请填写目标地址', 'Target address is required'); return }
      if (!this.form.listen_port) { this.formError = _t('请填写监听端口', 'Listen port is required'); return }
      if (!this.form.target_port) { this.formError = _t('请填写目标端口', 'Target port is required'); return }

      this.saving = true
      try {
        const method = this.form.id ? 'PUT' : 'POST'
        const url    = this.form.id ? '/api/rules/'+this.form.id : '/api/rules'
	        const payload = this.buildRulePayload()
        const res = await fetch(url, {
          method,
          headers: {'Content-Type':'application/json'},
	          body: JSON.stringify(payload)
        })
        const d = await res.json()
        if (d.success) {
          showToast('success', this.form.id ? _t('规则已更新', 'Rule updated') : _t('规则已创建', 'Rule created'))
	          if (d.message) showToast('warning', d.message)
          this._ruleModal.hide()
	          await this.refresh({ background: true })
        } else {
          this.formError = d.message || _t('保存失败', 'Save failed')
        }
      } catch (e) {
        this.formError = _t('网络错误: ', 'Network error: ') + e.message
      } finally {
        this.saving = false
      }
    },

    async toggle(r) {
      const res = await fetch('/api/rules/'+r.id+'/toggle', {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({enabled:!r.enabled})
      })
      const d = await res.json()
      if (d.success) {
	        if (d.message) showToast('warning', d.message)
	        await this.refresh({ background: true })
      } else {
        showToast('danger', d.message || _t('操作失败', 'Operation failed'))
      }
    },

    confirmDelete(r) {
      showConfirm(_t('确定要删除规则「' + r.name + '」吗？此操作不可撤销。',
                      'Are you sure to delete rule "' + r.name + '"? This cannot be undone.'), () => {
        this.deleteRule(r)
      })
    },

    async deleteRule(r) {
      const res = await fetch('/api/rules/'+r.id, { method:'DELETE' })
      const d = await res.json()
      if (d.success) {
        showToast('success', _t('规则「' + r.name + '」已删除', 'Rule "' + r.name + '" deleted'))
	        if (d.message) showToast('warning', d.message)
	        await this.refresh({ background: true })
      } else {
        showToast('danger', d.message || _t('删除失败', 'Delete failed'))
      }
    },

    async showWSLModal() {
	      await this.loadWSLCapability()
	      if (!this.canShowWSLImport) return
	      this.wslPorts = []
	      this.wslSelected = []
	      this.wslDistro = ''
      this._wslModal.show()
	      if (this.wslDistros.length === 0) {
	        showToast('warning', this.wslCapability.reason || _t('WSL2 不可用', 'WSL2 unavailable'))
      }
    },

	    showDiagnosticsModal() {
	      this._diagnosticsModal.show()
	    },

	    startDiagnosticsRefresh() {
	      if (this._diagnosticsTimer) return
	      this._diagnosticsTimer = setInterval(() => this.loadDiagnostics({ background: true }), 5000)
	    },

	    stopDiagnosticsRefresh() {
	      if (!this._diagnosticsTimer) return
	      clearInterval(this._diagnosticsTimer)
	      this._diagnosticsTimer = null
	    },

	    async loadDiagnostics(options = {}) {
	      const background = !!options.background
	      if (background && (!this._diagnosticsVisible || document.hidden)) return
	      if (this._diagnosticsInFlight) return
	      this._diagnosticsInFlight = true
	      if (!background) this.diagnosticsLoading = true
	      this.diagnosticsError = ''
	      try {
	        const res = await fetch('/api/diagnostics', { headers: { 'Accept': 'application/json' }, cache: 'no-store' })
	        const contentType = res.headers.get('content-type') || ''
	        const d = contentType.includes('application/json') ? await res.json() : null
	        if (!res.ok) {
	          this.diagnosticsError = d?.message || (res.status === 404
	            ? _t('诊断接口不可用，请刷新页面或重启到最新版本。', 'Diagnostics endpoint is unavailable. Please refresh or restart with the latest build.')
	            : _t('加载诊断信息失败', 'Failed to load diagnostics'))
	          return
	        }
	        if (d.success) {
	          this.diagnostics = d.data || null
	        } else {
	          this.diagnosticsError = d.message || _t('加载诊断信息失败', 'Failed to load diagnostics')
	        }
	      } catch (e) {
	        this.diagnosticsError = _t('加载诊断信息失败: ', 'Failed to load diagnostics: ') + e.message
	      } finally {
	        if (!background) this.diagnosticsLoading = false
	        this._diagnosticsInFlight = false
	      }
	    },

	    diagnosticsJsonText() {
	      return JSON.stringify(this.diagnostics || {}, null, 2)
	    },

	    async copyDiagnosticsJson() {
	      if (!this.diagnostics) return
	      const text = this.diagnosticsJsonText()
	      try {
	        if (navigator.clipboard?.writeText) {
	          await navigator.clipboard.writeText(text)
	        } else {
	          const ta = document.createElement('textarea')
	          ta.value = text
	          ta.setAttribute('readonly', '')
	          ta.style.position = 'fixed'
	          ta.style.opacity = '0'
	          document.body.appendChild(ta)
	          ta.select()
	          document.execCommand('copy')
	          document.body.removeChild(ta)
	        }
	        showToast('success', _t('已复制 diagnostics JSON', 'Diagnostics JSON copied'))
	      } catch (e) {
	        showToast('danger', _t('复制 diagnostics JSON 失败', 'Failed to copy diagnostics JSON') + ': ' + e.message)
	      }
	    },

	    downloadDiagnosticsJson() {
	      if (!this.diagnostics) return
	      const stamp = String(this.diagnostics?.timestamp || new Date().toISOString()).replace(/[.:]/g, '-')
	      const blob = new Blob([this.diagnosticsJsonText()], { type: 'application/json;charset=utf-8' })
	      const url = URL.createObjectURL(blob)
	      const link = document.createElement('a')
	      link.href = url
	      link.download = 'diagnostics-' + stamp + '.json'
	      document.body.appendChild(link)
	      link.click()
	      document.body.removeChild(link)
	      window.setTimeout(() => URL.revokeObjectURL(url), 1000)
	      showToast('success', _t('已下载 diagnostics 快照', 'Diagnostics snapshot downloaded'))
	    },

    async loadWSLPorts() {
	      if (!this.canShowWSLImport || !this.wslDistro) { this.wslPorts = []; return }
      this.wslLoading = true
      this.wslSelected = []
      try {
        const res = await fetch('/api/wsl/ports/'+encodeURIComponent(this.wslDistro))
        const d = await res.json()
        this.wslPorts = d.success ? (d.data || []) : []
	        if (!d.success) showToast('warning', d.message || _t('查询 WSL 端口失败', 'Failed to load WSL ports'))
	      } catch {
	        this.wslPorts = []
	        showToast('danger', _t('查询 WSL 端口失败', 'Failed to load WSL ports'))
      } finally {
        this.wslLoading = false
      }
    },

    wslIsSelected(p) {
      return this.wslSelected.some(s => s.protocol === p.protocol && s.port === p.port)
    },

    wslToggle(p) {
      const idx = this.wslSelected.findIndex(s => s.protocol === p.protocol && s.port === p.port)
      if (idx >= 0) this.wslSelected.splice(idx, 1)
      else this.wslSelected.push(p)
    },

    wslSelectAll() {
      this.wslSelected = [...this.wslPorts]
    },

    async importWSL() {
	      if (!this.canShowWSLImport || this.wslSelected.length === 0) return
      this.wslImporting = true
      try {
        const res = await fetch('/api/wsl/import', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ distro: this.wslDistro, ports: this.wslSelected })
        })
        const d = await res.json()
        if (d.success) {
          const n = (d.data||[]).length
          showToast('success', _t('成功导入 ' + n + ' 条规则', 'Successfully imported ' + n + ' rule(s)'))
	          if (d.message) showToast('warning', d.message)
          this._wslModal.hide()
	          await this.refresh({ background: true })
        } else {
          showToast('danger', d.message || _t('导入失败', 'Import failed'))
        }
      } finally {
        this.wslImporting = false
      }
    },

    toggleLang() {
      const next = this.lang === 'zh-CN' ? 'en' : 'zh-CN'
      this.lang = next
      _currentLang = next
      document.documentElement.lang = next
      try { localStorage.setItem('app_lang', next) } catch {}
    },

    t(zh, en) { return this.lang === 'en' ? en : zh },

    toggleTheme() {
      const html = document.documentElement
      const current = html.getAttribute('data-bs-theme')
      const next = current === 'dark' ? 'light' : 'dark'
      html.setAttribute('data-bs-theme', next)
      html.setAttribute('data-bs-theme-mode', next)
      this.isDark = next === 'dark'
    },

    statusClass(s) {
      const m = { active:'badge--status-active', inactive:'badge--status-inactive', error:'badge--status-error' }
      return m[s] || 'badge--status-inactive'
    },

    statusLabel(s) {
      const m = _isEn()
        ? { active:'Running', inactive:'Stopped', error:'Error' }
        : { active:'运行中', inactive:'已停止', error:'错误' }
      return m[s] || s
    },

    fmtBytes(n) {
      if (!n) return '0 B'
      const u = ['B','KB','MB','GB','TB']
      let i = 0, v = n
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++ }
      return v.toFixed(1) + ' ' + u[i]
	    },

	    fmtNumber(n) {
	      return Number(n || 0).toLocaleString()
	    },

	    fmtDateTime(v) {
	      if (!v) return '—'
	      const d = new Date(v)
	      return Number.isNaN(d.getTime()) ? v : d.toLocaleString()
	    },

	    summaryTimeMeta(item) {
	      const parts = []
	      if (item?.last_error_at) parts.push(this.t('最近错误 ','Last error ') + this.fmtDateTime(item.last_error_at))
	      if (item?.last_status_change_at) parts.push(this.t('状态变化 ','Status changed ') + this.fmtDateTime(item.last_status_change_at))
	      if (item?.updated_at) parts.push(this.t('配置更新 ','Config updated ') + this.fmtDateTime(item.updated_at))
	      return parts.join(' · ') || this.t('暂无时间线','No timeline')
	    },

	    fmtDurationNs(ns) {
	      const ms = Number(ns || 0) / 1e6
	      if (!ms) return '0 ms'
	      if (ms >= 1000) return (ms / 1000).toFixed(2) + ' s'
	      return ms.toFixed(2) + ' ms'
    }
  }
}
</script>
</body>
</html>
